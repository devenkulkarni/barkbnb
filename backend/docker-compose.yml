version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: barkbnb-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: barkbnb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barkbnb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
